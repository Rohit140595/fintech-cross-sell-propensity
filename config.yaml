# Central configuration — all paths, model settings, and pipeline parameters.

paths:
  raw_dir:        data/raw
  processed_dir:  data/processed
  model_dir:      models
  model_file:     models/cross_sell_model.pkl
  shap_features:  models/shap_features.json

data:
  train_file:     train.csv
  test_size:      0.20       # random stratified split (no temporal ordering in this dataset)
  target_col:     Response

split:
  random_state:   42

features:
  shap_top_n:     20
  encode_cols:    ["Gender", "Vehicle_Age", "Vehicle_Damage"]

model:
  random_state:   42

  # Stage 1: will the customer respond to cross-sell? (binary classifier)
  stage1:
    n_estimators:      500
    learning_rate:     0.05
    max_depth:         6
    subsample:         0.8
    colsample_bytree:  0.8
    scale_pos_weight:  auto    # set to neg/pos ratio at training time

tuning:
  n_trials:   50
  cv_folds:   5

api:
  host: 0.0.0.0
  port: 8000
